<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach Report | Momstone</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #171717;
      --muted: #888;
      --rose: #d8b8ac;
      --rose-dark: #c9826a;
      --bg: #faf8f6;
      --card: #ffffff;
      --border: #ede8e4;
      --coach-accent: #2d4a3e;
      --coach-light: #f0f4f2;
      --warn: #c9826a;
      --warn-light: #fdf3ef;
      --good: #3d6b5a;
      --good-light: #eef4f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Satoshi', sans-serif; background: var(--bg); color: var(--ink); }

    /* ACCESS GATE */
    #gate {
      position: fixed; inset: 0; background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; gap: 24px;
    }
    .gate-brand { font-size: 13px; letter-spacing: 4px; color: var(--rose); font-weight: 700; }
    .gate-title { font-size: 22px; color: #fff; font-weight: 500; }
    .gate-sub { font-size: 13px; color: rgba(255,255,255,.4); }
    .gate-input {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px; padding: 14px 20px; color: #fff; font-size: 15px;
      font-family: 'Satoshi', sans-serif; width: 280px; outline: none;
      text-align: center; letter-spacing: 2px;
    }
    .gate-input:focus { border-color: var(--rose); }
    .gate-btn {
      background: var(--rose-dark); color: #fff; border: none; border-radius: 10px;
      padding: 13px 32px; font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'Satoshi', sans-serif; width: 280px;
    }
    .gate-error { font-size: 13px; color: #e07070; }

    /* LOADING */
    #loading-screen {
      position: fixed; inset: 0; background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 100;
    }
    .loading-brand { font-size: 13px; letter-spacing: 4px; color: var(--rose); font-weight: 700; }
    .loading-spinner {
      width: 28px; height: 28px; border: 2px solid rgba(255,255,255,.1);
      border-top-color: var(--rose); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .loading-text { font-size: 13px; color: rgba(255,255,255,.4); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOPBAR */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: var(--ink); padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-brand { font-size: 12px; letter-spacing: 3px; color: var(--rose); font-weight: 700; }
    .topbar-badge {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      background: var(--coach-accent); color: #fff; padding: 4px 12px;
      border-radius: 999px; font-weight: 700;
    }
    .print-btn {
      background: transparent; border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.7); padding: 7px 16px; border-radius: 8px;
      font-size: 12px; cursor: pointer; font-family: 'Satoshi', sans-serif;
    }

    /* LAYOUT */
    #app { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

    /* SECTIONS */
    .section { margin-bottom: 48px; }
    .section-kicker {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--coach-accent); font-weight: 700; margin-bottom: 8px;
    }
    .section-title { font-size: 26px; font-weight: 500; letter-spacing: -.02em; margin-bottom: 6px; }
    .section-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

    /* PROFILE CARD */
    .profile-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .profile-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
    }
    .profile-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .profile-value { font-size: 15px; font-weight: 600; color: var(--ink); }

    /* RADAR */
    .radar-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; margin-bottom: 16px;
    }
    .radar-meta {
      display: flex; gap: 24px; margin-top: 16px; padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .radar-meta-item { font-size: 13px; color: var(--muted); }
    .radar-meta-item strong { color: var(--ink); }

    /* MUSIC CARD */
    .music-card {
      background: var(--ink); border-radius: 16px; padding: 28px 32px;
      margin-bottom: 12px;
    }
    .music-opener-label {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--rose); font-weight: 700; margin-bottom: 16px;
    }
    .music-tracks { display: flex; flex-direction: column; gap: 14px; }
    .music-track {
      display: flex; gap: 14px; align-items: flex-start;
    }
    .music-domain-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      background: rgba(255,255,255,.08); color: var(--rose);
      padding: 4px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0;
      margin-top: 2px;
    }
    .music-text { font-size: 14px; color: rgba(255,255,255,.75); line-height: 1.7; }
    .opener-question {
      background: rgba(255,255,255,.06); border-left: 3px solid var(--rose);
      padding: 14px 18px; border-radius: 0 10px 10px 0; margin-top: 20px;
    }
    .opener-q-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--rose); margin-bottom: 6px; }
    .opener-q-text { font-size: 14px; color: rgba(255,255,255,.85); font-style: italic; line-height: 1.7; }

    /* ANALYSIS CARDS */
    .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:600px) { .analysis-grid { grid-template-columns: 1fr; } }
    .analysis-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
    }
    .analysis-card.warn { border-color: #e8c4b4; background: var(--warn-light); }
    .analysis-card.good { border-color: #b4d4c8; background: var(--good-light); }
    .ac-label {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); font-weight: 700; margin-bottom: 8px;
    }
    .ac-value { font-size: 36px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .ac-value.warn { color: var(--warn); }
    .ac-value.good { color: var(--good); }
    .ac-text { font-size: 13px; color: var(--muted); line-height: 1.7; }

    /* GAP PROFILE */
    .gap-domains {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;
    }
    .gap-col { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .gap-col.strength { border-color: #b4d4c8; }
    .gap-col.drain { border-color: #e8c4b4; }
    .gap-col-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; }
    .gap-col.strength .gap-col-label { color: var(--good); }
    .gap-col.drain .gap-col-label { color: var(--warn); }
    .gap-domain-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .gap-domain-item:last-child { border-bottom: none; }
    .gap-score { font-weight: 700; }
    .gap-score.strength { color: var(--good); }
    .gap-score.drain { color: var(--warn); }

    /* CLUSTER */
    .cluster-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
    .cluster-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }
    .cluster-name { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .cluster-score { font-size: 28px; font-weight: 700; color: var(--ink); }
    .cluster-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin: 10px 0; }
    .cluster-bar { height: 4px; border-radius: 2px; background: var(--rose-dark); }
    .cluster-summary { font-size: 12px; color: var(--muted); line-height: 1.6; }

    /* DOMAIN DETAIL */
    .domain-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; margin-bottom: 16px;
    }
    .domain-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .domain-code { font-size: 10px; letter-spacing: 2px; font-weight: 700; color: var(--muted); }
    .domain-name { font-size: 18px; font-weight: 700; margin-top: 2px; }
    .domain-score-wrap { text-align: right; }
    .domain-score { font-size: 32px; font-weight: 700; }
    .domain-band {
      display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1px;
      padding: 3px 10px; border-radius: 999px; margin-top: 4px;
    }
    .band-A { background: #eef4f1; color: var(--good); }
    .band-B { background: #f0f4f2; color: #4a7a6a; }
    .band-C { background: #fdf8ef; color: #a07840; }
    .band-D { background: #fdf3ef; color: var(--warn); }
    .band-E { background: #fdeaea; color: #c04040; }

    .domain-fields { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
    .domain-field-label {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); font-weight: 700; margin-bottom: 4px;
    }
    .domain-field-text { font-size: 13px; color: var(--ink); line-height: 1.8; }

    /* REFLECTION GUIDE */
    .reflection-guide {
      background: var(--coach-light); border: 1px solid #c8dcd5;
      border-radius: 12px; padding: 20px; margin-top: 16px;
    }
    .rg-label {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--coach-accent); font-weight: 700; margin-bottom: 14px;
    }
    .rg-items { display: flex; flex-direction: column; gap: 10px; }
    .rg-item { display: flex; gap: 10px; align-items: flex-start; }
    .rg-type {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      background: var(--coach-accent); color: #fff;
      padding: 3px 8px; border-radius: 4px; white-space: nowrap;
      flex-shrink: 0; margin-top: 1px;
    }
    .rg-meta { font-size: 11px; color: var(--coach-accent); margin-bottom: 2px; opacity: .7; }
    .rg-text { font-size: 13px; color: var(--ink); line-height: 1.7; }

    /* COACH MEMO */
    .memo-area {
      width: 100%; min-height: 160px; padding: 18px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; font-family: 'Satoshi', sans-serif;
      font-size: 14px; color: var(--ink); resize: vertical; outline: none;
      line-height: 1.8;
    }
    .memo-area:focus { border-color: var(--rose-dark); }

    /* PRINT */
    @media print {
      .topbar { display: none; }
      .reflection-guide { break-inside: avoid; }
      .domain-card { break-inside: avoid; }
    }
  </style>
</head>

// ─── ACCESS GATE ─────────────────────────────────────────────────────────────
function checkGate() {
  const val = document.getElementById('gate-input').value.trim();
  if (val === ACCESS_TOKEN) {
    document.getElementById('gate').style.display = 'none';
    const params = new URLSearchParams(window.location.search);
    const row = params.get('row');
    if (row) {
      document.getElementById('loading-screen').style.display = 'flex';
      loadReport(parseInt(row));
    } else {
      document.getElementById('app').innerHTML = '<div style="padding:60px;text-align:center;color:#888;">No row parameter in URL. Use ?row=XX&token=momstone2026</div>';
      document.getElementById('app').style.display = 'block';
      document.getElementById('topbar').style.display = 'flex';
    }
  } else {
    document.getElementById('gate-error').style.display = 'block';
  }
}

document.getElementById('gate-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkGate();
});

// Auto-check token in URL
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('token') === ACCESS_TOKEN) {
    document.getElementById('gate').style.display = 'none';
    const row = params.get('row');
    if (row) {
      document.getElementById('loading-screen').style.display = 'flex';
      loadReport(parseInt(row));
    }
  }
})();

// ─── DATA ────────────────────────────────────────────────────────────────────
function get(d, k, fallback='') { return d[k] !== undefined && d[k] !== '' ? d[k] : fallback; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadReport(row) {
  try {
    const lang = new URLSearchParams(window.location.search).get('lang') === 'en' ? 'en' : 'ko';
    const res = await fetch(`${APPS_SCRIPT_URL}?row=${row}&lang=${lang}`);
    const json = await res.json();
    if (json.result !== 'success') throw new Error(json.message);
    renderReport(json.data, row);
  } catch(err) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').innerHTML = `<div style="padding:60px;text-align:center;color:#888;">Unable to load report: ${err.message}</div>`;
    document.getElementById('app').style.display = 'block';
    document.getElementById('topbar').style.display = 'flex';
  }
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

  const lang = new URLSearchParams(window.location.search).get('lang') === 'en' ? 'en' : 'ko';

  // Domain scores
  const scores = domainScoreVals;
  const domainScoreVals = DOMAINS.map(dom => parseFloat(get(d, dom.code+'_score', 0)));
  const overall = parseFloat(get(d,'Overall_Avg', 0)) || 
    (domainScoreVals.length ? Math.round(domainScoreVals.reduce((a,b)=>a+b,0)/domainScoreVals.length * 100)/100 : 0);

  const bufferMessage = get(d,'Buffer_Message','');

  const strengthGapLabel = get(d,'Strength_Gap_Label','');
  const vulnIndex = get(d,'Vulnerability_Index','—');
  const vulnLabel = get(d,'Vulnerability_Label','');
  const coachReady = get(d,'Coaching_Readiness','—');
  const coachReadyLabel = get(d,'Coaching_Readiness_Label','');
  const relSelf = get(d,'Relational_Self_Dynamic','—');
  const relSelfLabel = get(d,'Relational_Self_Label','');

  const openerEntry = REFLECTION_DB.find(e =>
    e.domain === lowestDom.code && e.band === band && e.type === 'Question'
  );

      <div class="profile-item"><div class="profile-label">Language</div><div class="profile-value">${lang === 'en' ? 'English' : '한국어'}</div></div>
      <div class="profile-item"><div class="profile-label">Overall</div><div class="profile-value" style="color:var(--rose-dark)">${overall.toFixed(1)} / 5.0</div></div>
    </div>
  </div>

  <!-- ③ SESSION OPENER -->

    <div class="section-title">Music Soundtrack + Opening</div>

      </div>

}
