<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 리듬 요약 | Momstone</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --rose: #d8b8ac;
      --rose-dark: #b88f7e;
      --rose-light: #f0e4de;
      --ink: #171717;
      --ink-soft: #1e1e1e;
      --muted: #666;
      --line: rgba(0,0,0,0.08);
      --bg: #ffffff;
      --bg-soft: #f8f5f3;
      --bg-deep: #111111;
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--ink-soft); line-height: 1.8; -webkit-font-smoothing: antialiased; }

    /* PRINT */
    @media print {
      .no-print { display: none !important; }
      .page-break { page-break-before: always; }
      body { background: white; }
      .cover { min-height: auto; padding: 60px 40px; }
    }

    /* NAV */
    .topbar { background: var(--bg-deep); color: rgba(255,255,255,0.5); padding: 10px 24px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
    .topbar-brand { color: var(--rose); font-weight: 700; }
    .topbar-home { color: rgba(255,255,255,0.5); background: none; border: 1px solid rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 50px; font-size: 11px; font-family: 'Pretendard', sans-serif; cursor: pointer; font-weight: 700; letter-spacing: 1px; transition: 0.2s; }
    .topbar-home:hover { color: white; border-color: rgba(255,255,255,0.5); }
    .print-btn { background: var(--rose-dark); color: white; border: none; padding: 6px 16px; border-radius: 50px; font-size: 11px; font-family: 'Pretendard', sans-serif; cursor: pointer; font-weight: 700; letter-spacing: 1px; transition: 0.2s; }
    .print-btn:hover { background: var(--rose); }
    /* PDF 확인 팝업 */
    .pdf-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
    .pdf-modal.show { display: flex; }
    .pdf-modal-box { background: white; border-radius: 20px; padding: 32px; max-width: 360px; width: 90%; text-align: center; }
    .pdf-modal-title { font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 10px; }
    .pdf-modal-sub { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
    .pdf-modal-btns { display: flex; gap: 10px; justify-content: center; }
    .pdf-modal-yes { background: var(--rose-dark); color: white; border: none; padding: 10px 24px; border-radius: 50px; font-size: 13px; font-weight: 700; font-family: 'Pretendard', sans-serif; cursor: pointer; }
    .pdf-modal-no { background: transparent; color: var(--muted); border: 1px solid var(--line); padding: 10px 24px; border-radius: 50px; font-size: 13px; font-weight: 700; font-family: 'Pretendard', sans-serif; cursor: pointer; }

    /* COVER */
    .cover { background: linear-gradient(160deg, #0f0f0f 0%, #1c1a19 100%); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 80px 48px; position: relative; overflow: hidden; }
    .cover::before { content: ""; position: absolute; width: 500px; height: 500px; border-radius: 50%; background: rgba(216,184,172,0.05); top: -200px; right: -150px; }
    .cover::after { content: ""; position: absolute; width: 300px; height: 300px; border-radius: 50%; background: rgba(216,184,172,0.04); bottom: -100px; left: -80px; }
    .cover-inner { max-width: 640px; position: relative; z-index: 1; }
    .cover-eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--rose); font-weight: 700; margin-bottom: 20px; }
    .cover-title { font-size: clamp(36px, 6vw, 56px); font-weight: 300; color: white; line-height: 1.1; margin-bottom: 24px; }
    .cover-title strong { font-weight: 700; color: var(--rose); }
    .cover-meta { display: flex; gap: 32px; margin-top: 48px; }
    .cover-meta-item { }
    .cover-meta-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 4px; }
    .cover-meta-value { font-size: 15px; color: rgba(255,255,255,0.85); font-weight: 500; }
    .cover-divider { width: 48px; height: 2px; background: var(--rose-dark); margin: 32px 0; }
    .cover-desc { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.9; max-width: 42ch; }

    /* SECTION WRAPPER */
    .section { max-width: 800px; margin: 0 auto; padding: 72px 24px; }
    .section-sm { max-width: 800px; margin: 0 auto; padding: 48px 24px; }

    /* SECTION LABEL */
    .section-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--rose-dark); font-weight: 700; margin-bottom: 12px; }
    .section-title { font-size: clamp(22px, 4vw, 32px); font-weight: 500; color: var(--ink); margin-bottom: 8px; line-height: 1.2; }
    .section-sub { font-size: 14px; color: var(--muted); line-height: 1.9; margin-bottom: 40px; }

    /* DIVIDER */
    .divider { height: 1px; background: var(--line); max-width: 800px; margin: 0 auto; }

    /* RADAR */
    .radar-wrap { max-width: 480px; margin: 0 auto 40px; }

    /* STABILITY CARD */
    .stability-card { background: var(--bg-deep); border-radius: 20px; padding: 32px; margin-top: 32px; display: flex; align-items: center; gap: 32px; }
    .stability-score { font-size: 56px; font-weight: 700; color: var(--rose); line-height: 1; }
    .stability-score span { font-size: 20px; color: rgba(255,255,255,0.4); font-weight: 400; }
    .stability-text { }
    .stability-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 6px; }
    .stability-summary { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.8; }

    /* CLUSTER GRID */
    .cluster-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .cluster-card { background: var(--bg-soft); border: 1px solid var(--line); border-radius: 16px; padding: 24px; }
    .cluster-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .cluster-name { font-size: 12px; font-weight: 700; color: var(--ink); letter-spacing: 0.5px; }
    .cluster-score { font-size: 24px; font-weight: 700; color: var(--rose-dark); }
    .cluster-bar-bg { height: 4px; background: var(--line); border-radius: 4px; margin-bottom: 12px; }
    .cluster-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--rose-dark), var(--rose)); }
    .cluster-summary { font-size: 12px; color: var(--muted); line-height: 1.75; }

    /* HIGHLIGHT CARD */
    .highlight-card { border-radius: 20px; padding: 32px; margin-bottom: 16px; }
    .highlight-card.low { background: linear-gradient(135deg, #1c1a19, #241f1d); border: 1px solid rgba(216,184,172,0.15); }
    .highlight-card.reset { background: var(--rose-light); border: 1px solid rgba(184,143,126,0.2); }
    .highlight-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
    .highlight-card.low .highlight-label { color: var(--rose); }
    .highlight-card.reset .highlight-label { color: var(--rose-dark); }
    .highlight-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
    .highlight-card.low .highlight-title { color: white; }
    .highlight-card.reset .highlight-title { color: var(--ink); }
    .highlight-text { font-size: 13px; line-height: 1.85; }
    .highlight-card.low .highlight-text { color: rgba(255,255,255,0.65); }
    .highlight-card.reset .highlight-text { color: var(--ink-soft); }

    /* DOMAIN CARDS */
    .domain-list { display: grid; gap: 24px; }
    .domain-card { background: var(--bg); border: 1px solid var(--line); border-radius: 20px; overflow: hidden; transition: box-shadow 0.2s; }
    .domain-card:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.07); }
    .domain-header { padding: 24px 28px 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; border-bottom: 1px solid var(--line); }
    .domain-name-wrap { }
    .domain-code { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--rose-dark); margin-bottom: 4px; }
    .domain-name-kr { font-size: 18px; font-weight: 600; color: var(--ink); line-height: 1.2; }
    .domain-name-en { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .domain-score-wrap { text-align: right; flex-shrink: 0; }
    .domain-score { font-size: 32px; font-weight: 700; color: var(--rose-dark); line-height: 1; }
    .domain-score-max { font-size: 12px; color: var(--muted); }
    .domain-stage { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 50px; margin-top: 6px; }
    .stage-A { background: #e8f5e9; color: #2e7d32; }
    .stage-B { background: #e3f2fd; color: #1565c0; }
    .stage-C { background: #fff8e1; color: #f57f17; }
    .stage-D { background: #fbe9e7; color: #bf360c; }
    .stage-E { background: #f3e5f5; color: #6a1b9a; }
    .domain-body { padding: 24px 28px; display: grid; gap: 18px; }
    .domain-field { }
    .domain-field-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .domain-field-text { font-size: 13px; color: var(--ink-soft); line-height: 1.8; }
    .domain-expression { font-size: 13px; color: var(--rose-dark); font-weight: 500; background: var(--rose-light); padding: 8px 14px; border-radius: 8px; display: inline-block; }
    .domain-emotions { display: flex; flex-wrap: wrap; gap: 6px; }
    .emotion-tag { font-size: 11px; padding: 4px 10px; border-radius: 50px; background: var(--bg-soft); border: 1px solid var(--line); color: var(--muted); }
    .domain-question { font-size: 14px; color: var(--ink); font-style: italic; line-height: 1.7; padding-left: 14px; border-left: 3px solid var(--rose-dark); }
    .domain-action { font-size: 13px; color: var(--ink-soft); line-height: 1.9; white-space: pre-line; }
    .domain-bar-wrap { margin-top: 4px; height: 4px; background: var(--line); border-radius: 4px; }
    .domain-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--rose-dark), var(--rose)); }

    /* CTA */
    .cta-section { background: linear-gradient(160deg, #0f0f0f, #1c1a19); padding: 80px 24px; text-align: center; }
    .cta-inner { max-width: 520px; margin: 0 auto; }
    .cta-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--rose); font-weight: 700; margin-bottom: 16px; }
    .cta-title { font-size: clamp(22px, 4vw, 32px); font-weight: 500; color: white; line-height: 1.3; margin-bottom: 12px; }
    .cta-sub { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.9; margin-bottom: 32px; }
    .btn-cta { display: inline-flex; align-items: center; gap: 8px; padding: 16px 36px; background: var(--rose-dark); color: white; border-radius: 999px; font-size: 15px; font-weight: 700; font-family: 'Pretendard', sans-serif; text-decoration: none; transition: 0.2s; }
    .btn-cta:hover { background: var(--rose); }
    .cta-note { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 14px; }

    /* FOOTER */
    footer { background: #080808; padding: 24px; text-align: center; }
    .footer-brand { font-size: 14px; color: var(--rose); letter-spacing: 3px; font-weight: 500; }

    /* LOCKED DOMAIN */
    .domain-locked { position: relative; overflow: hidden; }
    .domain-locked .domain-body { filter: blur(4px); pointer-events: none; user-select: none; }
    .domain-lock-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.97) 40%); padding: 32px 28px 28px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px; }
    .domain-lock-icon { font-size: 20px; }
    .domain-lock-text { font-size: 13px; color: var(--muted); line-height: 1.7; }
    .domain-lock-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px; background: var(--rose-dark); color: white; border-radius: 999px; font-size: 13px; font-weight: 700; font-family: 'Pretendard', sans-serif; text-decoration: none; transition: 0.2s; }
    .domain-lock-btn:hover { background: var(--rose); }
    .footer-copy { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 4px; }

    /* ERROR */
    .error-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .error-title { font-size: 24px; font-weight: 500; color: var(--ink); margin-bottom: 8px; }
    .error-sub { font-size: 14px; color: var(--muted); }

    /* LOADING */
    #loading-screen { position: fixed; inset: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; z-index: 9998; transition: opacity 0.4s ease; }
    #loading-screen.hide { opacity: 0; pointer-events: none; }
    .loading-brand { font-size: 15px; font-weight: 700; color: var(--rose); letter-spacing: 4px; text-transform: lowercase; }
    .loading-text { font-size: 14px; color: rgba(255,255,255,0.45); letter-spacing: 0.5px; }
    .loading-dots { display: flex; gap: 8px; }
    .loading-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--rose-dark); opacity: 0.3; animation: pulse 1.2s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
    body.loading .topbar, body.loading .pdf-modal { visibility: hidden; }

    @media (max-width: 600px) {
      .cover { padding: 60px 24px; }
      .cluster-grid { grid-template-columns: 1fr; }
      .stability-card { flex-direction: column; gap: 16px; }
      .domain-header { flex-direction: column; gap: 12px; }
      .domain-score-wrap { text-align: left; }
    }
  
    /* LANG TOGGLE */
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
    }
    .lang-toggle a {
      color: rgba(255,255,255,.35);
      text-decoration: none;
      transition: color .2s;
    }
    .lang-toggle a:hover { color: rgba(255,255,255,.75); }
    .lang-toggle .lang-active { color: rgba(255,255,255,.85); cursor: default; pointer-events: none; }
    .lang-toggle .lang-sep { color: rgba(255,255,255,.2); font-weight: 300; }
    </style>
</head>
<body class="loading">

<!-- 로딩 화면 -->
<div id="loading-screen">
  <div class="loading-brand">momstone</div>
  <div class="loading-dots">
    <span></span><span></span><span></span>
  </div>
  <div class="loading-text">리듬 리포트를 불러오는 중이에요</div>
</div>

<div class="topbar no-print">
  <button class="topbar-home" onclick="goHome()">← 홈</button>
  <span class="topbar-brand">momstone</span>
  <button class="print-btn" onclick="window.print()">PDF 저장</button>
  <div class="lang-toggle"><span class="lang-active">KO</span><span class="lang-sep"> · </span><a href="/en/summary.html">EN</a></div>
</div>

<!-- PDF 확인 팝업 -->
<div class="pdf-modal" id="pdf-modal">
  <div class="pdf-modal-box">
    <div class="pdf-modal-title">홈으로 이동할까요?</div>
    <div class="pdf-modal-sub">리포트를 PDF로 저장하신 후 이동하시겠어요?<br>저장하지 않으면 다시 보기 어려울 수 있어요.</div>
    <div class="pdf-modal-btns">
      <button class="pdf-modal-yes" onclick="window.print(); setTimeout(() => window.location.href='index.html', 500)">PDF 저장 후 이동</button>
      <button class="pdf-modal-no" onclick="window.location.href='index.html'">그냥 이동</button>
    </div>
  </div>
</div>

<div id="app"></div>

<script>
// ─── Apps Script URL ─────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzMNpM2L4Bba-dA_zJWf0IDvn0Yxm647GgF7X4H7SEf_-Pp8bRuoUOhkv4wR1qTljrL/exec';

function goHome() {
  document.getElementById('pdf-modal').classList.add('show');
}

// ─── 데이터 파싱 ─────────────────────────────────────────────────────────────
function parseData(r) {
  const get = (k, def='') => (r[k] !== undefined && r[k] !== null && r[k] !== '') ? String(r[k]) : def;
  const num = (k) => parseFloat(get(k, '0')) || 0;

  return {
    name:       get('Name', '익명'),
    date:       get('Date', new Date().toLocaleDateString('ko-KR')),
    stability:  num('Stability_score'),
    stability_summary: get('Stability_summary', ''),
    overall_avg: (function() {
      const keys = ['EB_score','EN_score','RE_score','SM_score','ID_score','RS_score','VA_score','SC_score','VG_score','TP_score','LS_score'];
      const vals = keys.map(k => parseFloat(r[k]) || 0);
      return Math.round((vals.reduce((a,b) => a+b, 0) / vals.length) * 10) / 10;
    })(),

    ef_score:   num('EF_score'),
    ef_summary: get('EF_Summary', ''),
    rf_score:   num('RF_score'),
    rf_summary: get('RF_Summary', ''),
    mf_score:   num('MF_score'),
    mf_summary: get('MF_Summary', ''),
    ei_score:   num('EI_score'),
    ei_summary: get('EI_Summary', ''),

    lowest:      get('최저도메인 이름', ''),
    reset_point:  get('Reset_Point', ''),
    reset_reason: get('Reset_Reason', ''),
    reset_signal: get('Reset_Signal', ''),
    reset_action: get('Reset_Action', ''),
    reset_bridge: get('Reset_Bridge', ''),

    domains: [
      { code:'EB', kr:'심리 상태', en:'Emotional Balance',
        score: num('EB_score'), stage: get('EF_stage',''),
        expression: get('EB_expression',''), summary: get('EB_summary',''),
        emotions: get('EB_emotions',''), question: get('EB_question',''), action: get('EB_action','') },
      { code:'EN', kr:'에너지 관리', en:'Energy Management',
        score: num('EN_score'), stage: get('EN_stage',''),
        expression: get('EN_expression',''), summary: get('EN_summary',''),
        emotions: get('EN_emotions',''), question: get('EN_question',''), action: get('EN_action','') },
      { code:'RE', kr:'회복탄력성', en:'Resilience',
        score: num('RE_score'), stage: get('RE_stage',''),
        expression: get('RE_expression',''), summary: get('RE_summary',''),
        emotions: get('RE_emotions',''), question: get('RE_question',''), action: get('RE_action','') },
      { code:'SM', kr:'강점·동기', en:'Strengths & Motivation',
        score: num('SM_score'), stage: get('SM_stage',''),
        expression: get('SM_expression',''), summary: get('SM_summary',''),
        emotions: get('SM_emotions',''), question: get('SM_question',''), action: get('SM_action','') },
      { code:'ID', kr:'정체감·역할통합', en:'Identity Integration',
        score: num('ID_score'), stage: get('ID_stage',''),
        expression: get('ID_expression',''), summary: get('ID_summary',''),
        emotions: get('ID_emotions',''), question: get('ID_question',''), action: get('ID_action','') },
      { code:'RS', kr:'관계 자원', en:'Relational Support',
        score: num('RS_score'), stage: get('RS_stage',''),
        expression: get('RS_expression',''), summary: get('RS_summary',''),
        emotions: get('RS_emotions',''), question: get('RS_question',''), action: get('RS_action','') },
      { code:'VA', kr:'가치·의미', en:'Values Alignment',
        score: num('VA_score'), stage: get('VA_stage',''),
        expression: get('VA_expression',''), summary: get('VA_summary',''),
        emotions: get('VA_emotions',''), question: get('VA_question',''), action: get('VA_action','') },
      { code:'SC', kr:'자기연민', en:'Self-Compassion',
        score: num('SC_score'), stage: get('SC_stage',''),
        expression: get('SC_expression',''), summary: get('SC_summary',''),
        emotions: get('SC_emotions',''), question: get('SC_question',''), action: get('SC_action','') },
      { code:'VG', kr:'비전·성장의지', en:'Vision & Growth',
        score: num('VG_score'), stage: get('VG_stage',''),
        expression: get('VG_expression',''), summary: get('VG_summary',''),
        emotions: get('VG_emotions',''), question: get('VG_question',''), action: get('VG_action','') },
      { code:'TP', kr:'시간·우선순위', en:'Time & Priority',
        score: num('TP_score'), stage: get('TP_stage',''),
        expression: get('TP_expression',''), summary: get('TP_summary',''),
        emotions: get('TP_emotions',''), question: get('TP_question',''), action: get('TP_action','') },
      { code:'LS', kr:'삶의 만족도', en:'Life Satisfaction',
        score: num('LS_score'), stage: get('LS_stage',''),
        expression: get('LS_expression',''), summary: get('LS_summary',''),
        emotions: get('LS_emotions',''), question: get('LS_question',''), action: get('LS_action','') },
    ]
  };
}

function stageClass(stage) {
  const s = (stage || '').charAt(0).toUpperCase();
  return 'stage-' + (s || 'C');
}

function stageLabel(stage) {
  const map = {
    'A': 'Flowing Harmony', 'B': 'Balanced Awareness',
    'C': 'Transitional Flow', 'D': 'Fragmented Rhythm', 'E': 'Silent Exhaustion'
  };
  return map[stage] || stage;
}

function pct(score) {
  return Math.round((score / 5) * 100);
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function dismissLoading() {
  const el = document.getElementById('loading-screen');
  if (!el) return;
  el.classList.add('hide');
  document.body.classList.remove('loading');
  setTimeout(() => el.remove(), 450);
}

function showLoadingError(title, sub) {
  const el = document.getElementById('loading-screen');
  if (el) {
    el.innerHTML = `
      <div class="loading-brand">momstone</div>
      <div style="text-align:center;margin-top:8px;">
        <div style="font-size:17px;font-weight:500;color:rgba(255,255,255,0.85);margin-bottom:8px;">${title}</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.7;">${sub}</div>
      </div>
    `;
  }
}
